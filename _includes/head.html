<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% seo %}

<!-- Content Security Policy: whitelist known external script/resource domains -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://js.hsforms.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
  style-src 'self' 'unsafe-inline' https://forms.hsforms.com;
  font-src 'self';
  img-src 'self' data: https://www.googletagmanager.com https://forms.hsforms.com https://track.hubspot.com;
  connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://region1.google-analytics.com https://forms.hsforms.com https://api.emailjs.com https://track.hubspot.com;
  frame-src https://www.googletagmanager.com https://forms.hsforms.com;
">

<!-- Preconnect to third-party domains -->
<link rel="preconnect" href="https://js.hsforms.net" crossorigin>
<link rel="preconnect" href="https://forms.hsforms.com" crossorigin>

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/images/favicon.png' | relative_url }}" sizes="32x32">
<link rel="icon" href="{{ '/assets/images/favicon.png' | relative_url }}" sizes="192x192">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon.png' | relative_url }}">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- Organization Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Breezy Risk Advisors",
  "url": "https://breezyins.com",
  "logo": "https://breezyins.com/assets/images/breezy-logo.png",
  "description": "{{ site.description }}",
  "founder": {
    "@type": "Person",
    "name": "Joerg Proeve"
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+1-717-490-7670",
    "contactType": "sales",
    "email": "contact@breezyins.com"
  },
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Lancaster",
    "addressRegion": "PA",
    "addressCountry": "US"
  },
  "sameAs": [
    "https://www.linkedin.com/company/breezy-risk-advisors"
  ]
}
</script>

{% include analytics.html %}
