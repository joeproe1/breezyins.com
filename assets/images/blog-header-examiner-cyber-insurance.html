sitemap: false

<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blog Header - What Your Examiner Expects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: #1E3A5F;
            overflow: hidden;
        }

        .header-image {
            width: 100vw;
            height: 100vh;
            background: #1E3A5F;
            position: relative;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: #3B82F6;
            opacity: 0.10;
            right: -160px;
            top: 50%;
            transform: translateY(-50%);
        }

        .circle-ring {
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            border: 2px solid #3B82F6;
            opacity: 0.30;
            right: -140px;
            top: 50%;
            transform: translateY(-50%);
        }

        .circle-ring-outer {
            position: absolute;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            border: 1.5px solid #3B82F6;
            opacity: 0.18;
            right: -190px;
            top: 50%;
            transform: translateY(-50%);
        }

        .accent-line {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            height: 2px;
            background: #3B82F6;
            opacity: 0.40;
        }

        .content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 72px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .category {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #3B82F6;
            margin-bottom: 24px;
        }

        .title {
            font-family: 'DM Sans', sans-serif;
            font-size: 56px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1.15;
            margin-bottom: 20px;
            max-width: 750px;
        }

        .subtitle {
            font-family: 'DM Sans', sans-serif;
            font-size: 32px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            max-width: 620px;
        }

        .logo {
            position: absolute;
            bottom: 40px;
            left: 80px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 26px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .logo .teal {
            color: #00D4AA;
        }
    </style>
</head>
<body>

<div class="header-image">
    <div class="circle"></div>
    <div class="circle-ring"></div>
    <div class="circle-ring-outer"></div>
    <div class="accent-line"></div>

    <div class="content">
        <svg width="100" height="100" viewBox="0 0 100 100" style="margin-bottom: 12px; opacity: 0.3;">
            <circle cx="35" cy="35" r="30" fill="none" stroke="#fff" stroke-width="5"/>
            <line x1="56" y1="56" x2="90" y2="90" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        </svg>
        <div class="title">What Your Examiner Expects From Your Cyber Insurance</div>
        <div class="subtitle">Having a policy is not enough. Here is what they want to see.</div>
    </div>

    <div class="logo">BREEZY<span class="teal">.risk</span></div>
</div>

</body>
</html>
